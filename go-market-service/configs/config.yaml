env: dev

server:
  addr: ":8080"
  read_timeout: 30
  write_timeout: 30

storage:
  postgres:
    host: localhost
    port: 5432
    user: quant
    password: quant123
    dbname: market_data
    sslmode: disable
    max_conns: 20
  redis:
    addr: localhost:6379
    password: ""
    db: 0
    pool_size: 100

log:
  level: debug
  format: console
  output_path: stdout

market:
  # 支持的K线周期
  timeframes:
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
    - 1w
  # 数据保留天数
  retention_days: 365
  # 交易所配置
  exchanges:
    - name: binance
      enabled: true
      api_key: ${BINANCE_API_KEY}
      secret_key: ${BINANCE_SECRET_KEY}
      ws_endpoint: wss://stream.binance.com:9443/ws
      rest_endpoint: https://api.binance.com
      rate_limit: 1200
      symbols:
        - BTCUSDT
        - ETHUSDT
        - BNBUSDT
    - name: okx
      enabled: false
      api_key: ${OKX_API_KEY}
      secret_key: ${OKX_SECRET_KEY}
      ws_endpoint: wss://ws.okx.com:8443/ws/v5/public
      rest_endpoint: https://www.okx.com
      rate_limit: 60
      symbols:
        - BTC-USDT
        - ETH-USDT

kafka:
  brokers:
    - localhost:9092
  topic_tick: market.tick
  topic_kline: market.kline
  topic_signal: market.signal
  consumer_group: market-service

grpc:
  addr: ":50051"
