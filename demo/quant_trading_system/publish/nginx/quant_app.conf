upstream quant_app_backend {
    server quant_app:8000;
    keepalive 32;
}

# 限流区域（在 http 块中定义，此处为片段，需放入 nginx.conf 的 http 块）
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name your-domain.com;

    # 有 SSL 证书时，取消注释以下两行强制跳转 HTTPS
    # return 301 https://$host$request_uri;

    # ---- API 路由 ----
    location /api/ {
        proxy_pass         http://quant_app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # 限流（需在 http 块中定义 limit_req_zone）
        # limit_req zone=api_limit burst=20 nodelay;

        # 响应缓冲
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ---- 健康检查端点（不记录访问日志）----
    location = /health {
        proxy_pass http://quant_app_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout    5s;
    }

    # ---- WebSocket 支持 ----
    location /ws/ {
        proxy_pass         http://quant_app_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- 安全响应头 ----
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- 隐藏 Nginx 版本 ----
    server_tokens off;
}

