version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_DB: quant_trading
      POSTGRES_USER: quant_user
      POSTGRES_PASSWORD: quant_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - quant_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user -d quant_trading"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quant_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 量化交易应用
  quant_app:
    build: .
    container_name: quant_app
    environment:
      DATABASE_URL: postgresql://quant_user:quant_password@postgres:5432/quant_trading
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - quant_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: quant_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      quant_app:
        condition: service_healthy
    networks:
      - quant_network
    restart: unless-stopped

  # 数据库管理工具（可选）
  pgadmin:
    image: dpage/pgadmin4
    container_name: quant_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quant.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - quant_network
    restart: unless-stopped

  # Redis管理工具（可选）
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: quant_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - quant_network
    restart: unless-stopped

  # 监控服务（可选）
  prometheus:
    image: prom/prometheus
    container_name: quant_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - quant_network
    restart: unless-stopped

  # 可视化监控（可选）
  grafana:
    image: grafana/grafana
    container_name: quant_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - quant_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  quant_network:
    driver: bridge

# 使用说明：
# 1. 启动所有服务：docker-compose up -d
# 2. 查看日志：docker-compose logs -f
# 3. 停止服务：docker-compose down
# 4. 重新构建：docker-compose up --build
# 5. 清理数据：docker-compose down -v

# 访问地址：
# - 应用API: http://localhost:8000
# - API文档: http://localhost:8000/docs
# - pgAdmin: http://localhost:5050
# - Redis Commander: http://localhost:8081
# - Prometheus: http://localhost:9090
# - Grafana: http://localhost:3000
